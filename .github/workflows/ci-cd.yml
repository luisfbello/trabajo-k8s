name: CI-CD Microservicio

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'chart/values.yaml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Definir tag con el numero de build
        id: tag
        run: echo "TAG=1.1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Construir y subir la imagen
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservicio-k8s:${{ steps.tag.outputs.TAG }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/microservicio-k8s:${{ steps.tag.outputs.TAG }}

      - name: Actualizar el tag en values.yaml
        run: |
          sed -i "s|tag: .*|tag: \"${{ steps.tag.outputs.TAG }}\"|" chart/values.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "CI: actualiza imagen a ${{ steps.tag.outputs.TAG }}"
          git push
